- name: 3. 核心步骤：直接在发布前原地生成最新的 data.json 和 1.json
        run: |
          cat > generate.js << 'EOF'
          const fs = require('fs');
          const path = require('path');

          function extractCaption(filePath) {
            try {
              const content = fs.readFileSync(filePath, 'utf8');
              // 1. 优先匹配新的 <div id="setu-title" class="title-capsule"> 格式
              let regex = /<div[^>]*id=[\"']?setu-title[\"']?[^>]*class=[\"']?title-capsule[\"']?[^>]*>([\s\S]*?)<\/div>/i;
              let match = regex.exec(content);

              // 2. 如果没匹配到，再尝试兼容旧的 <p style="text-align:left; font-size:16px"> 格式
              if (!match || !match[1]) {
                regex = /<p[^>]*style\s*=\s*[\"'][^\"']*?\btext-align\s*:\s*left[^\"']*?font-size\s*:\s*16px[^>]*>([\s\S]*?)<\/p>/gi;
                match = regex.exec(content);
              }

              // 3. 只要匹配到了，移除 HTML 标签后，其余内容全量保留
              if (match && match[1]) {
                let text = match[1]
                  .replace(/<[^>]+>/g, '')     // 仅移除所有 HTML 标签
                  .trim();
                return text;
              }
            } catch (e) {
              console.log(`读取失败 ${filePath}: ${e.message}`);
            }
            return '';
          }

          function scanDir(dirName) {
            const dirPath = path.join(__dirname, dirName);
            if (!fs.existsSync(dirPath)) return [];
            return fs.readdirSync(dirPath)
              .filter(file => file.endsWith('.html') && file !== 'index.html')
              .map(file => ({
                file: file,
                caption: extractCaption(path.join(dirPath, file))
              }))
              .sort((a, b) => {
                const numA = parseInt(a.file.match(/\d+/)?.[0] || 0);
                const numB = parseInt(b.file.match(/\d+/)?.[0] || 0);
                return numB - numA;
              });
          }

          console.log('正在扫描目录中...');
          const setuItems = scanDir('setu');
          const zrsetuItems = scanDir('zrsetu');
          const updatedTime = new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'}).replace(/\//g,'-');

          // 全量包
          const allData = { updated: updatedTime, setu: setuItems, zrsetu: zrsetuItems };
          fs.writeFileSync('data.json', JSON.stringify(allData, null, 2));

          // 切分分页数据
          const PAGESIZE = 50;
          const pageDir = path.join(__dirname, 'data_pages');
          if (!fs.existsSync(pageDir)) fs.mkdirSync(pageDir);

          const totalPages = Math.max(Math.ceil(setuItems.length / PAGESIZE), Math.ceil(zrsetuItems.length / PAGESIZE));
          for (let p = 1; p <= totalPages; p++) {
            const start = (p - 1) * PAGESIZE;
            const pageData = {
              updated: updatedTime,
              setu: setuItems.slice(start, start + PAGESIZE),
              zrsetu: zrsetuItems.slice(start, start + PAGESIZE)
            };
            fs.writeFileSync(path.join(pageDir, `${p}.json`), JSON.stringify(pageData, null, 2));
          }
          console.log('🎉 内存中 JSON 及分页数据原地全量切分成功！');
          EOF
          node generate.js