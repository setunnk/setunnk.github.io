name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]   # 当你有任何新网页推送到 main 分支时触发
  workflow_dispatch:     # 允许你在后台手动点击触发

permissions:
  contents: read
  pages: write
  id-token: write

# 确保同一时间只有一个发布任务在跑，新的来了自动掐断旧的，防止死锁
concurrency:
  group: "pages"
  cancel-in-progress: true 

jobs:
  # ----------------------------------------------------
  # 任务 1：负责拉取代码、编译、运行脚本生成数据、打包产物
  # ----------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取最新代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # 极限提升拉取速度

      - name: 2. 安装 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 3. 核心步骤：直接在发布前原地生成最新的 data.json 和 1.json（完全复刻你原版逻辑）
        run: |
          cat > generate.js << 'EOF'
          const fs = require('fs');
          const path = require('path');

          function extractCaption(filePath) {
            try {
              const content = fs.readFileSync(filePath, 'utf8');
              // 优先匹配新的 <div id="setu-title" class="title-capsule"> 格式
              let regex = /<div[^>]*id=[\"']?setu-title[\"']?[^>]*class=[\"']?title-capsule[\"']?[^>]*>([\s\S]*?)<\/div>/i;
              let match = regex.exec(content);

              // 如果没匹配到，再尝试兼容旧的 <p style="text-align:left; font-size:16px"> 格式
              if (!match || !match[1]) {
                regex = /<p[^>]*style\s*=\s*[\"'][^\"']*?\btext-align\s*:\s*left[^\"']*?font-size\s*:\s*16px[^>]*>([\s\S]*?)<\/p>/gi;
                match = regex.exec(content);
              }

              if (match && match[1]) {
                return match[1].replace(/<[^>]+>/g, '').trim();
              }
            } catch (e) {
              console.log(`读取失败 ${filePath}: ${e.message}`);
            }
            return '';
          }

          function scanDir(dirName) {
            const dirPath = path.join(__dirname, dirName);
            if (!fs.existsSync(dirPath)) return [];
            return fs.readdirSync(dirPath)
              .filter(file => file.endsWith('.html') && file !== 'index.html')
              .map(file => ({
                file: file,
                caption: extractCaption(path.join(dirPath, file))
              }))
              .sort((a, b) => {
                const numA = parseInt(a.file.match(/\d+/)?.[0] || 0);
                const numB = parseInt(b.file.match(/\d+/)?.[0] || 0);
                return numB - numA;
              });
          }

          console.log('正在扫描目录中...');
          const setuItems = scanDir('setu');
          const zrsetuItems = scanDir('zrsetu');
          const updatedTime = new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'}).replace(/\//g,'-');

          // 保留原始全量 data.json 用于全局检索
          const allData = {
            updated: updatedTime,
            setu: setuItems,
            zrsetu: zrsetuItems
          };
          fs.writeFileSync('data.json', JSON.stringify(allData, null, 2));

          // 将后台大包按 50 条数据进行动态切分
          const PAGESIZE = 50;
          const pageDir = path.join(__dirname, 'data_pages');
          if (!fs.existsSync(pageDir)) {
            fs.mkdirSync(pageDir);
          }

          const totalPages = Math.max(Math.ceil(setuItems.length / PAGESIZE), Math.ceil(zrsetuItems.length / PAGESIZE));
          for (let p = 1; p <= totalPages; p++) {
            const start = (p - 1) * PAGESIZE;
            const pageData = {
              updated: updatedTime,
              setu: setuItems.slice(start, start + PAGESIZE),
              zrsetu: zrsetuItems.slice(start, start + PAGESIZE)
            };
            fs.writeFileSync(path.join(pageDir, `${p}.json`), JSON.stringify(pageData, null, 2));
          }

          console.log(`自动化切分成功！每页 50 条，共生成 ${totalPages} 个分页文件。`);
          EOF
          node generate.js

      - name: 4. 准备托管配置
        uses: actions/configure-pages@v5

      - name: 5. 统一打包并上传产物（生成名为 github-pages 的打包件）
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}

  # ----------------------------------------------------
  # 任务 2：负责把打包好的产物正式发布到 GitHub Pages
  # ----------------------------------------------------
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # 关键：确保必须等上面的 build 任务成功完成后才执行部署
    steps:
      - name: 6. 正式发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4