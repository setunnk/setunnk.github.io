name: Auto Update data.json
on:
  push:
    paths:
      - 'setu/**'
      - 'zrsetu/**'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # 1. 恢复为你原有的 v6 版本，并确保拉取深度足够进行差异比对
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2 

      # 🌟 核心拦截步骤：检查是否有新增(A)或删除(D)的文件
      - name: 检查是否包含删除或新增操作
        id: change_check
        run: |
          CHANGES=$(git diff --name-only --diff-filter=AD HEAD~1 HEAD -- 'setu' 'zrsetu' || true)
          
          if [ -z "$CHANGES" ]; then
            echo "检测结果：本次提交仅为内容修改，没有发生文件的删除或新增。正在拦截自动运行..."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "检测结果：发现文件发生新增或删除操作，允许运行自动化脚本。"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      # 2. 升级安装 Node 环境的插件版本，并将 node-version 指定为 24
      - uses: actions/setup-node@v6
        if: steps.change_check.outputs.should_run == 'true' # 🌟 已修正为正确的点语法（.）
        with:
          node-version: '24'
          
      - name: 生成 data.json 及分页数据
        if: steps.change_check.outputs.should_run == 'true' # 🌟 已修正为正确的点语法（.）
        run: |
          cat > generate.js << 'EOF'
          const fs = require('fs');
          const path = require('path');

          function extractCaption(filePath) {
            try {
              const content = fs.readFileSync(filePath, 'utf8');
              // 优先匹配新的 <div id="setu-title" class="title-capsule"> 格式
              let regex = /<div[^>]*id=[\"']?setu-title[\"']?[^>]*class=[\"']?title-capsule[\"']?[^>]*>([\s\S]*?)<\/div>/i;
              let match = regex.exec(content);

              // 如果没匹配到，再尝试兼容旧的 <p style="text-align:left; font-size:16px"> 格式
              if (!match || !match[1]) {
                regex = /<p[^>]*style\s*=\s*[\"'][^\"']*?\btext-align\s*:\s*left[^\"']*?font-size\s*:\s*16px[^>]*>([\s\S]*?)<\/p>/gi;
                match = regex.exec(content);
              }

              if (match && match[1]) {
                let text = match[1]
                  .replace(/<[^>]+>/g, '')     // 移除所有HTML标签
                  .trim();
                return text;
              }
            } catch (e) {
              console.log(`读取失败 ${filePath}: ${e.message}`);
            }
            return '';
          }

          function getItems(folder) {
            if (!fs.existsSync(folder)) return [];
            return fs.readdirSync(folder)
              .filter(f => f.endsWith('.html'))
              .map(f => ({
                file: f,
                caption: extractCaption(path.join(folder, f))
              }))
              .sort((a,b) => (parseInt(b.file)||0) - (parseInt(a.file)||0));
          }

          // 1. 获取全量排序后的数据
          const setuItems = getItems('setu');
          const zrsetuItems = getItems('zrsetu');
          const updatedTime = new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'}).replace(/\//g,'-');

          // 2. 保留原始全量 data.json 用于全局检索
          const allData = {
            updated: updatedTime,
            setu: setuItems,
            zrsetu: zrsetuItems
          };
          fs.writeFileSync('data.json', JSON.stringify(allData, null, 2));

          // 3. 将后台大包按 50 条数据进行动态切分
          const PAGESIZE = 50;
          const pageDir = path.join(__dirname, 'data_pages');
          if (!fs.existsSync(pageDir)) {
            fs.mkdirSync(pageDir);
          }

          const totalPages = Math.max(Math.ceil(setuItems.length / PAGESIZE), Math.ceil(zrsetuItems.length / PAGESIZE));
          for (let p = 1; p <= totalPages; p++) {
            const start = (p - 1) * PAGESIZE;
            const pageData = {
              updated: updatedTime,
              setu: setuItems.slice(start, start + PAGESIZE),
              zrsetu: zrsetuItems.slice(start, start + PAGESIZE)
            };
            fs.writeFileSync(path.join(pageDir, `${p}.json`), JSON.stringify(pageData, null, 2));
          }

          console.log(`自动化切分成功！每页 50 条，共生成 ${totalPages} 个分页文件。`);
          EOF
          node generate.js
      - name: 提交更新
        if: steps.change_check.outputs.should_run == 'true' # 🌟 已修正为正确的点语法（.）
        run: |
          git config user.name "AutoBot"
          git config user.email "bot@github.com"
          git add data.json data_pages/*.json
          git diff --quiet && git diff --staged --quiet ||
          git commit -m "精简结构并自动切分50条数据 [skip ci]"
          git push origin main