<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL 转 HTML 生成器</title>
<style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    textarea { width: 100%; height: 200px; margin-bottom: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; padding: 8px; }
    button { padding: 10px 15px; margin-right: 10px; cursor: pointer; background-color: #f0f0f0; border: 1px solid #bbb; border-radius: 4px; }
    button:hover { background-color: #e0e0e0; }
    #output { width: 100%; height: 250px; margin-top: 10px; font-size: 14px; }
    .section { margin-top: 40px; padding-top: 20px; border-top: 2px solid #eee; }
    
    /* 紧凑型配置栏样式 */
    .config-inline { margin: 12px 0; font-size: 14px; display: flex; flex-wrap: wrap; align-items: center; gap: 15px; }
    .config-inline div { display: flex; align-items: center; }
    
    input[type="text"], input[type="number"], select { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; margin-left: 5px; }
    input[type="text"] { width: 120px; }
    input[type="number"] { width: 70px; }
    select { width: 140px; background-color: #fff; }
    
    /* 大批量图片生成的输入框样式 */
    .section input[type="text"] { width: 150px; margin: 8px 0; }
    .section input[type="number"] { width: 80px; margin: 8px 0; }
    .section select { width: 168px; margin: 8px 0; }
    .section label { display: inline-block; min-width: 110px; }
</style>
</head>
<body>

<h2>媒体 HTML 代码生成器</h2>

<p>在下面输入每行一个图片链接（留空则不生成图片代码）：</p>
<textarea id="inputUrls" placeholder="在这里粘贴图片URL，每行一个"></textarea>

<div class="config-inline">
    <strong>视频配置：</strong>
    <div>
        <label>视频目录</label>
        <select id="videoFolder">
            <option value="zrsetu" selected>/zrsetu</option>
            <option value="setu">/setu</option>
        </select>
    </div>
    <div>
        <label>期号</label>
        <input type="text" id="videoIssue" onblur="saveSetting('videoIssue', this.value)" value="1">
    </div>
    <div>
        <label>生成数量</label>
        <input type="number" id="videoCount" value="" min="0" max="9999" placeholder="留空不生成">
    </div>
</div>

<div style="margin: 15px 0 10px 0;">
    <button onclick="generateCombinedHTML()">生成代码</button>
    <button onclick="copyResult()">复制结果</button>
    <button onclick="clearCombinedAll()">清空本区全部</button>
</div>

<textarea id="output" placeholder="生成的HTML代码会显示在这里（视频会追加在图片后面，中间隔两行）"></textarea>


<div class="section">
<h2>批量生成图片链接</h2>
<p>固定域名：https://r2.setutime.com</p>

<div>
    <label>目录选择：</label>
    <select id="folderSelect">
        <option value="zrsetu_pic" selected>zrsetu_pic</option>
        <option value="setu_pic">setu_pic</option>
    </select>
</div>

<div>
    <label>文件名基础/期号：</label>
    <input type="text" id="picIssue" value="pic-">
    <span style="font-size:12px; color:#888; margin-left:10px;">(系统会自动在后面加上 “-序号”)</span>
</div>

<div>
    <label>文件后缀：</label>
    <input type="text" id="picSuffix" value="webp">
</div>

<div>
    <label>生成数量：</label>
    <input type="number" id="picCount" value="" min="1" max="9999" placeholder="留空不生成">
</div>

<div style="margin-top:15px;">
    <button onclick="generateBatchUrls()">生成链接</button>
    <button onclick="copyBatchResult()">复制结果</button>
    <button onclick="clearBatch()">清空本区</button>
</div>

<textarea id="batchOutput" style="width: 100%; height: 250px; margin-top: 10px; font-size: 14px;" placeholder="批量生成的链接会显示在这里"></textarea>
</div>

<script>
// 页面加载时恢复记忆
window.onload = function() {
    if(localStorage.getItem("videoIssue")) {
        document.getElementById("videoIssue").value = localStorage.getItem("videoIssue");
    }
};

// 保存设置
function saveSetting(key, value) {
    localStorage.setItem(key, value);
}

// 核心整合：生成图片+视频的 HTML
function generateCombinedHTML() {
    const results = [];

    // --- 处理图片部分 ---
    const input = document.getElementById("inputUrls").value.trim();
    if (input) {
        const urls = input.split("\n").map(u => u.trim()).filter(u => u !== "");
        const imgHtml = urls
            .map((url, index) => 
                `<div class="image-item"><div class="img-wrap"><img data-src="${url}" alt="${index + 1}"></div></div>`
            )
            .join("\n");
        results.push(imgHtml);
    }

    // --- 处理视频部分 ---
    const videoFolder = document.getElementById("videoFolder").value; // 获取新选择的视频目录
    const issue = document.getElementById("videoIssue").value.trim() || "1";
    saveSetting("videoIssue", issue); // 自动保存期号
    
    const countInput = document.getElementById("videoCount").value.trim();
    const count = countInput === "" ? 0 : parseInt(countInput);

    if (count > 0 && count <= 9999) {
        const videoLines = [];
        for(let i = 1; i <= count; i++) {
            const item = `<div class="image-item">
  <video class="responsive-video" controls preload="metadata" playsinline webkit-playsinline>
    <source src="https://r2.setutime.com/${videoFolder}/video-${issue}-${i}.mp4#t=0.1" type="video/mp4">
  </video>
</div>`;
            videoLines.push(item);
        }
        results.push(videoLines.join("\n"));
    }

    // --- 输出合并后的结果（如果两者都有，中间隔两行回车 '\n\n\n'） ---
    document.getElementById("output").value = results.join("\n\n\n");
}

// 图片批量URL生成
function generateBatchUrls() {
    const folder = document.getElementById("folderSelect").value;
    const picIssue = document.getElementById("picIssue").value.trim() || "pic-";
    const suffix = document.getElementById("picSuffix").value.trim() || "webp";
    
    const countInput = document.getElementById("picCount").value.trim();
    if (countInput === "") return; // 如果留空则不执行生成

    const count = parseInt(countInput);
    if (count < 1 || count > 9999) return;

    // 清理后缀可能带有点号(.)的情况
    const cleanSuffix = suffix.startsWith('.') ? suffix.slice(1) : suffix;

    const lines = [];
    for(let i = 1; i <= count; i++) {
        // 格式：https://r2.setutime.com/目录/文件名基础-序号.后缀
        const url = `https://r2.setutime.com/${folder}/${picIssue}-${i}.${cleanSuffix}`;
        lines.push(url);
    }
    document.getElementById("batchOutput").value = lines.join("\n");
}

// 复制功能
function copyResult() { document.getElementById("output").select(); document.execCommand("copy"); }
function copyBatchResult() { document.getElementById("batchOutput").select(); document.execCommand("copy"); }

// 清空合并功能区
function clearCombinedAll() { 
    document.getElementById("inputUrls").value = ""; 
    document.getElementById("videoFolder").value = "zrsetu"; // 恢复视频目录默认值
    document.getElementById("videoIssue").value = "1"; 
    localStorage.removeItem("videoIssue"); 
    document.getElementById("videoCount").value = ""; 
    document.getElementById("output").value = ""; 
}

// 清空批量图片URL生成区（更新重置默认值）
function clearBatch() { 
    document.getElementById("folderSelect").value = "zrsetu_pic"; 
    document.getElementById("picIssue").value = "pic-"; 
    document.getElementById("picSuffix").value = "webp"; 
    document.getElementById("picCount").value = ""; 
    document.getElementById("batchOutput").value = ""; 
}
</script>
</body>
</html>
