<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>媒体 HTML 统一生成器</title>
<style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: auto; color: #333; }
    h2 { margin-bottom: 10px; }
    textarea { width: 100%; height: 180px; margin-bottom: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 18px; margin-right: 10px; cursor: pointer; background-color: #f5f5f5; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; }
    button:hover { background-color: #e0e0e0; }
    button.primary { background-color: #007bff; color: white; border-color: #0069d9; }
    button.primary:hover { background-color: #0062cc; }
    #output { height: 250px; background-color: #fafafa; }
    
    .config-panel { background: #f9f9f9; padding: 15px; border-radius: 6px; border: 1px solid #eee; margin: 15px 0; }
    .config-row { display: flex; flex-wrap: wrap; align-items: center; gap: 20px; margin-bottom: 12px; }
    .config-row:last-child { margin-bottom: 0; }
    .config-item { display: flex; align-items: center; }
    .config-item label { font-weight: bold; margin-right: 5px; font-size: 14px; }
    
    input[type="text"], input[type="number"], select { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    input[type="text"] { width: 100px; }
    input[type="number"] { width: 90px; }
    select { background-color: #fff; min-width: 120px; }
</style>
</head>
<body>

<h2>媒体 HTML 统一生成器</h2>

<div class="config-panel">
    <div class="config-row" style="margin-bottom: 15px; background: #eef5ff; padding: 10px; border-radius: 4px;">
        <div class="config-item">
            <label style="color: #0056b3; font-size: 15px;">统一期号：</label>
            <input type="text" id="globalIssue" onblur="saveSetting('globalIssue', this.value)" value="23" style="width: 120px; font-weight: bold; border-color: #007bff;">
        </div>
    </div>
    
    <div class="config-row">
        <div class="config-item">
            <label>图片目录：</label>
            <select id="imgFolder">
                <option value="zrsetu_pic" selected>zrsetu_pic</option>
                <option value="setu_pic">setu_pic</option>
            </select>
        </div>
        <div class="config-item">
            <label>自动生成图片数量：</label>
            <input type="number" id="imgCount" min="0" max="9999" placeholder="留空不生成">
        </div>
    </div>

    <hr style="border: none; border-top: 1px dashed #ddd; margin: 12px 0;">

    <div class="config-row">
        <div class="config-item">
            <label>视频目录：</label>
            <select id="videoFolder">
                <option value="zrsetu" selected>/zrsetu</option>
                <option value="setu">/setu</option>
            </select>
        </div>
        <div class="config-item">
            <label>自动生成视频数量：</label>
            <input type="number" id="videoCount" min="0" max="9999" placeholder="留空不生成">
        </div>
    </div>
</div>

<p style="margin-bottom: 5px;"><strong>额外手动输入图片链接</strong>（每行一个，生成时将自动**排在上述生成的链接之后**且带连续序号）：</p>
<textarea id="inputUrls" placeholder="在这里粘贴需要追加的额外图片URL..."></textarea>

<div style="margin: 15px 0;">
    <button class="primary" onclick="generateHTML()">生成 HTML 代码</button>
    <button onclick="copyResult()">复制结果</button>
    <button onclick="clearAll()">清空全部</button>
</div>

<p style="margin-bottom: 5px;"><strong>生成的 HTML 代码：</strong></p>
<textarea id="output" readonly placeholder="生成的 HTML 代码会显示在这里（视频会自动追加在图片后面，中间隔两行）"></textarea>

<script>
const DOMAIN = "https://r2.setutime.com";

// 页面加载时恢复期号记忆
window.onload = function() {
    if(localStorage.getItem("globalIssue")) {
        document.getElementById("globalIssue").value = localStorage.getItem("globalIssue");
    }
};

// 保存设置
function saveSetting(key, value) {
    localStorage.setItem(key, value);
}

// 一键生成最终 HTML
function generateHTML() {
    const results = [];
    const finalImgUrls = [];
    
    // 获取全局统一期号
    const issue = document.getElementById("globalIssue").value.trim() || "1";
    saveSetting("globalIssue", issue); // 记忆期号

    // 1. 处理自动批量生成的图片
    const imgCountInput = document.getElementById("imgCount").value.trim();
    const imgCount = imgCountInput === "" ? 0 : parseInt(imgCountInput);
    
    if (imgCount > 0 && imgCount <= 9999) {
        const folder = document.getElementById("imgFolder").value;
        for (let i = 1; i <= imgCount; i++) {
            // 固定格式：pic-期号-序号.webp
            finalImgUrls.push(`${DOMAIN}/${folder}/pic-${issue}-${i}.webp`);
        }
    }

    // 2. 获取并追加手动输入的外部链接
    const manualInput = document.getElementById("inputUrls").value.trim();
    if (manualInput) {
        const manualUrls = manualInput.split("\n").map(u => u.trim()).filter(u => u !== "");
        // 直接将外部手动输入的链接追加到后面
        finalImgUrls.push(...manualUrls);
    }

    // 3. 将全部确定的图片链接转化为 HTML，并统一从1开始生成全新连续序号 (alt)
    if (finalImgUrls.length > 0) {
        const imgHtml = finalImgUrls
            .map((url, index) => `<div class="image-item"><div class="img-wrap"><img data-src="${url}" alt="${index + 1}"></div></div>`)
            .join("\n");
        results.push(imgHtml);
    }

    // 4. 处理视频批量生成逻辑（同样使用全局期号）
    const videoCountInput = document.getElementById("videoCount").value.trim();
    const videoCount = videoCountInput === "" ? 0 : parseInt(videoCountInput);

    if (videoCount > 0 && videoCount <= 9999) {
        const videoFolder = document.getElementById("videoFolder").value;
        const videoLines = [];
        for (let i = 1; i <= videoCount; i++) {
            videoLines.push(`<div class="image-item">
  <video class="responsive-video" controls preload="metadata" playsinline webkit-playsinline>
    <source src="${DOMAIN}/${videoFolder}/video-${issue}-${i}.mp4#t=0.1" type="video/mp4">
  </video>
</div>`);
        }
        results.push(videoLines.join("\n"));
    }

    // 5. 组合输出（图片与视频之间留出空行隔开）
    document.getElementById("output").value = results.join("\n\n\n");
}

// 复制功能
function copyResult() {
    const output = document.getElementById("output");
    output.select();
    document.execCommand("copy");
}

// 重置清空所有区域
function clearAll() {
    document.getElementById("globalIssue").value = "1";
    localStorage.removeItem("globalIssue");
    
    document.getElementById("imgFolder").value = "zrsetu_pic";
    document.getElementById("imgCount").value = "";
    document.getElementById("inputUrls").value = "";
    
    document.getElementById("videoFolder").value = "zrsetu";
    document.getElementById("videoCount").value = "";
    
    document.getElementById("output").value = "";
}
</script>
</body>
</html>
