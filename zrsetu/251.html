<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #fafafa;
  color: #333;
  line-height: 1.6;
}

.container {
  max-width: 100%;
  padding: 15px;
}

.header {
  text-align: center;
  padding: 20px 0;
  margin-bottom: 20px;
  border-bottom: 1px solid #eee;
}

.title {
  font-size: 1.5rem;
  font-weight: 600;
  color: #1e1e1e;
}
#setu-title {
    /* 强制对齐 */
    display: block !important;
    text-align: left !important;
    width: 100% !important; 
    
    /* 宽度与位置：居中胶囊 */
    max-width: min(92vw, 700px);
    margin: 15px auto 25px !important; 
    
    /* 胶囊背景颜色 */
    background-color: #f2f4f6 !important; 
    border-radius: 999px !important;
    
    /* 内边距 */
    padding: 12px 25px 12px 35px !important;
    
    font-size: 15px;
    font-weight: 500;
    color: #4a5568; 
    line-height: 1.6;
    
    border: none;
    box-sizing: border-box;
    word-wrap: break-word;
}

.image-grid {
  display: flex;
  flex-direction: column;
  gap: 18px;
  width: 100%;
  max-width: min(90vw, 700px);
  margin: 0 auto;
}

.image-item {
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0, 0, 0, .06);
  background: #f0f2f5;
  position: relative;
}

/* 合并后的 .img-wrap：骨架屏 + 图片容器 */
.img-wrap {
  position: relative;
  width: 100%;
  min-height: 180px;
  background: #f3f4f6;                  /* fallback 背景色 */
  overflow: hidden;
}

/* shimmer 动画层 */
.img-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, #f3f4f6 0%, #e9eef6 50%, #f3f4f6 100%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite ease-in-out;
  z-index: 1;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* 图片本身：淡入 + 保持比例 */
.img-wrap img {
  width: 100%;
  height: auto;
  display: block;
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 2;
  object-fit: contain;
  position: relative;
}

/* 加载完成：移除 shimmer，显示图片 */
.img-wrap.loaded::before {
  opacity: 0;
  transition: opacity 0.5s ease;
}
.img-wrap.loaded img {
  opacity: 1;
}

/* ===== 下载模块 ===== */
.explanation {
  background: linear-gradient(135deg, #f2f4f6, #eceef0);
  border: 1px solid #dde2e9;
  border-radius: 16px;

  text-align: center;

  margin-bottom: 10px;
  font-weight: 600;
}

.explanation p {

}

.explanation p span {
  color: #2d3748;
  font-weight: 700;
  text-shadow: 0 0 8px rgba(45, 55, 72, 0.3);
}

.preserve {
  display: inline-block;
  margin-top: 15px;
  padding: 11px 28px;
  border-radius: 999px;
  background: linear-gradient(135deg, #383f50, #626982);
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  box-shadow: 0 6px 16px rgba(56, 63, 80, 0.38);

}

.preserve:hover {

  box-shadow: 0 8px 22px rgba(56, 63, 80, 0.48);
  background: linear-gradient(135deg, #424a5e, #6d748c);
}

.save {

    justify-content: center;

    height: 46px;
    margin: 0 auto;

}

.save:hover {
    background: #eeeeee;

}
.fixed-button {

  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);

.collection-wrap {

<script>
document.addEventListener("DOMContentLoaded", function() {
    if ('IntersectionObserver' in window) {
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    const wrap = img.parentElement;
                    if (img.dataset.src) {
                        img.src = img.dataset.src;
                        img.onload = () => { wrap.classList.add('loaded'); };
                    }
                    observer.unobserve(img);
                }
            });
        }, { rootMargin: "0px 0px 300px 0px" });

        const imgs = document.querySelectorAll('.img-wrap img');
        imgs.forEach(img => imageObserver.observe(img));
    } else {
        const imgs = document.querySelectorAll('.img-wrap img');
        imgs.forEach(img => {
            img.src = img.dataset.src;
            img.onload = () => img.parentElement.classList.add('loaded');
        });
    }
    const titleEl = document.querySelector('.title');
    if (titleEl) {
        const match = titleEl.innerText.match(/\d+/);
        if (match) {
            const currentNo = parseInt(match[0]);
            const prevNo = currentNo - 1;
            const prevLink = document.getElementById('prev-link');
            if (prevLink) {
                prevLink.href = `https://setutime.com/zrsetu/${prevNo}`;
            }
            const downloadUrl = `https://dl.setutime.com/support?id=zrsetu_${currentNo}`;
            const topSaveBtn = document.querySelector('.save-blue');
            if (topSaveBtn) {
                topSaveBtn.href = downloadUrl;
            }
            const bottomSaveBtn = document.querySelector('.preserve');
            if (bottomSaveBtn) {
                bottomSaveBtn.href = downloadUrl;
            }
           
        }
    }
});
</script>
