<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #fafafa;
  color: #333;
  line-height: 1.6;
}

.container {
  max-width: 100%;
  padding: 15px;
}

.header {
  text-align: center;
  padding: 20px 0;
  margin-bottom: 20px;
  border-bottom: 1px solid #eee;
}

.title {
  font-size: 1.5rem;
  font-weight: 600;
  color: #1e1e1e;
}
#setu-title {
    display: block !important;
    text-align: left !important;
    width: 100% !important; 
    max-width: min(92vw, 700px);
    margin: 15px auto 25px !important; 
    background-color: #f2f4f6 !important; 
    border-radius: 999px !important;
    padding: 12px 25px 12px 35px !important;
    
    font-size: 15px;
    font-weight: 500;
    color: #4a5568; 
    line-height: 1.6;
    
    border: none;
    box-sizing: border-box;
    word-wrap: break-word;
}

.image-grid {
  display: flex;
  flex-direction: column;
  gap: 18px;
  width: 100%;
  max-width: min(90vw, 700px);
  margin: 0 auto;
}

.image-item {
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0, 0, 0, .06);
  background: #f0f2f5;
  position: relative;
}

/* 合并后的 .img-wrap：骨架屏 + 图片容器 */
.img-wrap {
  position: relative;
  width: 100%;
  min-height: 180px;
  background: #f3f4f6; 
  overflow: hidden;
}

/* shimmer 动画层 */
.img-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, #f3f4f6 0%, #e9eef6 50%, #f3f4f6 100%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite ease-in-out;
  z-index: 1;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* 图片本身：淡入 + 保持比例 */
.img-wrap img {
  width: 100%;
  height: auto;
  display: block;
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 2;
  object-fit: contain;
  position: relative;
}

/* 加载完成：移除 shimmer，显示图片 */
.img-wrap.loaded::before {
  opacity: 0;
  transition: opacity 0.5s ease;
}
.img-wrap.loaded img {
  opacity: 1;
}

/* ===== 下载模块 ===== */
.explanation {

.explanation p {

}

.explanation p span {
  color: #2d3748;
  font-weight: 700;

}

.preserve {

  color: #fff;
  text-decoration: none;
  font-weight: 600;
  font-size: 1.1rem;
  transition: all .3s ease;
  box-sizing: border-box;
}

.preserve:hover {
  transform: translateY(-2px);
  background: linear-gradient(135deg, #67c267, #5db85d);
  box-shadow: 0 8px 22px rgba(93, 184, 93, 0.45);
}

.save {

    align-items: center;
    justify-content: center;

    height: 46px;
    margin: 0 auto;
    padding: 0;

}

.save:hover {

    transform: translateY(-2px); 
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
}

/* --- 底部悬浮按钮样式 --- */
.fixed-button {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) scale(1);
  width: calc(100% - 80px);
  max-width: 500px;
  z-index: 1000;
  will-change: transform, opacity; 
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}

.fixed-button.hidden {
  transform: translateX(-50%) translateY(20px) scale(0.85);
  opacity: 0;
}

.fixed-button a {

  text-align: center;

<script>
document.addEventListener("DOMContentLoaded", function() {
    if ('IntersectionObserver' in window) {
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    const wrap = img.parentElement;
                    if (img.dataset.src) {
                        img.src = img.dataset.src;
                        img.onload = () => { wrap.classList.add('loaded'); };
                    }
                    observer.unobserve(img);
                }
            });
        }, { rootMargin: "0px 0px 300px 0px" });

        const imgs = document.querySelectorAll('.img-wrap img');
        imgs.forEach(img => imageObserver.observe(img));
    } else {
        const imgs = document.querySelectorAll('.img-wrap img');
        imgs.forEach(img => {
            img.src = img.dataset.src;
            img.onload = () => img.parentElement.classList.add('loaded');
        });
    }
    const titleEl = document.querySelector('.title');
    if (titleEl) {
        const match = titleEl.innerText.match(/\d+/);
        if (match) {
            const currentNo = parseInt(match[0]);
            const prevNo = currentNo - 1;
            const prevLink = document.getElementById('prev-link');
            if (prevLink) {
                prevLink.href = `https://setutime.com/zrsetu/${prevNo}`;
            }
            const downloadUrl = `https://dl.setutime.com/support?id=zrsetu_${currentNo}`;
            const topSaveBtn = document.querySelector('.save-blue');
            if (topSaveBtn) {
                topSaveBtn.href = downloadUrl;
            }
            const bottomSaveBtn = document.querySelector('.preserve');
            if (bottomSaveBtn) {
                bottomSaveBtn.href = downloadUrl;
            }
        }
    }


    const fixedBtn = document.querySelector('.fixed-button');
    let lastScrollY = window.scrollY;
    let ticking = false;

    function updateButtonVisibility() {
        const currentScrollY = window.scrollY;
        if (currentScrollY > lastScrollY && currentScrollY > 10) {
            fixedBtn.classList.add('hidden');
        } else {
            fixedBtn.classList.remove('hidden');
        }
        lastScrollY = currentScrollY;
        ticking = false;
    }

    window.addEventListener('scroll', () => {
        if (!ticking) {
            window.requestAnimationFrame(updateButtonVisibility);
            ticking = true;
        }
    });
});
</script>
