<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" id="meta-theme-color" content="#6366f1">
<link rel="stylesheet" href="https://cdn.jsdmirror.com/gh/FrecklyComb1728/blog@main/public/fonts/xiaolai.css">
<link rel="icon" href="https://wdcdn.qpic.cn/MTMxMDI2NjEwNzAzNzc4NzY_582527_m5n34EQ_C6U8f2WE_1782832113" type="image/png">
<meta name="description" content="点击前往SetuTime~">
<title>SetuTime!</title>
<style>
  :root {
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.35);
    --bg: #090d16;
    --panel-bg: rgba(22, 29, 45, 0.75);
    --panel-border: rgba(255, 255, 255, 0.08);
    --text: #f8fafc;
    --sub: #94a3b8;
  }

  html.light-mode {
    --bg: #f1f5f9;
    --panel-bg: rgba(255, 255, 255, 0.85);
    --panel-border: rgba(0, 0, 0, 0.08);
    --text: #0f172a;
    --sub: #64748b;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
    background-color: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background-color 0.4s ease, color 0.4s ease;
    overflow-x: hidden;
  }

  /* 顶部微光进度条 */
  .top-progress {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    width: 0%;
    background: linear-gradient(90deg, #6366f1, #ec4899, #10b981);
    z-index: 1000;
    transition: width 0.3s ease, opacity 0.3s ease;
  }

  /* 全局氛围背景光斑 */
  .bg-glow {
    position: fixed;
    top: -10vw;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    height: 80vw;
    max-width: 600px;
    max-height: 600px;
    background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
    pointer-events: none;
    z-index: 0;
    transition: background 0.5s ease;
    filter: blur(40px);
  }

  /* Hero 头部 - 杂志超大字号 */
  header {
    position: relative;
    z-index: 1;
    padding: 60px 24px 20px;
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .brand-meta {
    display: flex;
    flex-direction: column;
  }

  .brand-title {
    font-size: 3.2rem;
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    background: linear-gradient(135deg, var(--text) 30%, var(--sub));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .brand-sub {
    font-size: 1rem;
    color: var(--sub);
    margin-top: 10px;
    font-family: 'xiaolai', sans-serif;
    letter-spacing: 1px;
  }

  .mode-switch {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    transition: all 0.2s ease;
  }
  .mode-switch:hover { transform: scale(1.05); }
  .mode-switch svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }
  html.light-mode .sun-icon { display: none; }
  html.light-mode .moon-icon { display: block; }
  html:not(.light-mode) .sun-icon { display: block; }
  html:not(.light-mode) .moon-icon { display: none; }

  /* 主内容区域 */
  main {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 24px 140px;
  }

  /* 骨架屏 */
  .skeleton-wrap {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .skeleton-item {
    height: 88px;
    border-radius: 18px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    animation: pulse 1.5s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  /* 杂志风列表元素 */
  .magazine-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .mag-card {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px);
  }
  .mag-card.enter {
    opacity: 1;
    transform: translateY(0);
  }
  .mag-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .mag-card:hover {
    transform: translateX(6px);
    border-color: var(--accent);
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
  }
  .mag-card:hover::before { opacity: 1; }

  .mag-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 80%;
  }

  .mag-num {
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .mag-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .mag-desc {
    font-size: 0.85rem;
    color: var(--sub);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .mag-arrow {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--sub);
    transition: all 0.3s ease;
  }
  .mag-card:hover .mag-arrow {
    background: var(--accent);
    color: #fff;
    transform: rotate(-45deg);
  }

  /* 底部悬浮控制台 (Dock Nav) */
  .dock-wrapper {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: calc(100vw - 32px);
  }

  .dock-bar {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 6px;
    border-radius: 99px;
    display: flex;
    align-items: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }

  .dock-item {
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--sub);
    cursor: pointer;
    transition: all 0.3s ease;
    user-select: none;
    white-space: nowrap;
  }
  .dock-item.active {
    background: var(--accent);
    color: #ffffff;
    box-shadow: 0 4px 15px var(--accent-glow);
  }

  .dock-circle-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: all 0.2s ease;
  }
  .dock-circle-btn:hover { transform: scale(1.08); }
  .dock-circle-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

  /* 现代风格极简分页器 */
  .page-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 32px;
    padding: 12px 20px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    backdrop-filter: blur(12px);
  }

  .p-btn {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    transition: opacity 0.2s;
  }
  .p-btn.disabled { opacity: 0.25; cursor: not-allowed; }

  .p-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--sub);
  }
  .p-input {
    width: 32px;
    height: 24px;
    background: transparent;
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    color: var(--text);
    text-align: center;
    font-weight: 700;
    outline: none;
  }

  /* 极致搜索浮层 */
  .search-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 1000;
    display: flex;
    justify-content: center;
    padding-top: 15vh;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .search-modal.active { opacity: 1; pointer-events: auto; }
  .search-box {
    width: 90%;
    max-width: 540px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .search-input-field {
    width: 100%;
    height: 54px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    padding: 0 20px;
    font-size: 1.05rem;
    color: var(--text);
    outline: none;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  .search-input-field:focus { border-color: var(--accent); }
  .search-results {
    max-height: 50vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
</style>
</head>
<body>

<div class="top-progress" id="progressBar"></div>
<div class="bg-glow" id="bgGlow"></div>

<header>
  <div class="brand-meta">
    <div class="brand-title" id="main-title">SetuTime</div>
    <div class="brand-sub" id="sub-title">ACGエッチ画像まとめ</div>
  </div>
  <div class="mode-switch" onclick="toggleDarkMode()" title="切换主题">
    <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line></svg>
    <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
  </div>
</header>

<main>
  <div class="skeleton-wrap" id="skeleton">
    <div class="skeleton-item"></div>
    <div class="skeleton-item"></div>
    <div class="skeleton-item"></div>
    <div class="skeleton-item"></div>
    <div class="skeleton-item"></div>
  </div>

  <ul class="magazine-list" id="contentList" style="display:none;"></ul>

  <div class="page-bar" id="paginationCtrl" style="display:none;">
    <div class="p-btn" id="prevPageBtn" onclick="changePage(-1)">← PREV</div>
    <div class="p-info">
      <input type="number" class="p-input" id="pageCurrentInput" min="1" value="1" onkeyup="if(event.keyCode===13)handleInputJump(this.value)" onblur="handleInputJump(this.value)">
      <span>/</span>
      <span id="pageTotalLabel">1</span>
    </div>
    <div class="p-btn" id="nextPageBtn" onclick="changePage(1)">NEXT →</div>
  </div>
</main>

<!-- 悬浮操控 Dock -->
<div class="dock-wrapper">
  <div class="dock-bar">
    <div class="dock-item" id="tab-acg" onclick="switchTab('acg')">全年龄向</div>
    <div class="dock-item active" id="tab-setu" onclick="switchTab('setu')">二次元篇</div>
    <div class="dock-item" id="tab-zrsetu" onclick="switchTab('zrsetu')">COS篇</div>
  </div>
  <div class="dock-circle-btn" onclick="toggleSearch(true)" title="搜索 (Ctrl+K)">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
  </div>
</div>

<!-- 极简全屏搜索 modal -->
<div class="search-modal" id="searchModal" onclick="if(event.target===this)toggleSearch(false)">
  <div class="search-box">
    <input type="text" class="search-input-field" id="searchInput" placeholder="搜索期号、关键字..." oninput="doSearch()">
    <div class="search-results magazine-list" id="searchResults"></div>
  </div>
</div>

<script>
let currentTab = 'setu';
const ONE_HOUR = 60 * 60 * 1000;

function getSavedPage(tabType) {
  try {
    const dataStr = localStorage.getItem(`setutime_page_data_${tabType}`);
    if (!dataStr) return 1;
    const item = JSON.parse(dataStr);
    if (new Date().getTime() - item.timestamp > ONE_HOUR) {
      localStorage.removeItem(`setutime_page_data_${tabType}`);
      return 1;
    }
    return parseInt(item.page) || 1;
  } catch (e) { return 1; }
}

function savePage(tabType, pageNum) {
  localStorage.setItem(`setutime_page_data_${tabType}`, JSON.stringify({ page: pageNum, timestamp: new Date().getTime() }));
}

let currentPage = { 
  acg: getSavedPage('acg'),
  setu: getSavedPage('setu'), 
  zrsetu: getSavedPage('zrsetu') 
};

let cachePages = {}; 
let allAcgItems = [], allSetuItems = [], allZrsetuItems = [];
let totalAcgCount = 0, totalSetuCount = 0, totalZrsetuCount = 0;

const ITEMS_PER_PAGE = 10;
const SERVER_ITEMS_PER_FILE = 50;

// 动态根路径解析
const rootUrl = `${window.location.protocol}//${window.location.host}/`;

function toggleDarkMode() {
  const isLight = document.documentElement.classList.toggle('light-mode');
  localStorage.setItem('setutime_light_mode', isLight ? 'true' : 'false');
}

function initDarkMode() {
  const savedLight = localStorage.getItem('setutime_light_mode');
  if (savedLight === 'true') {
    document.documentElement.classList.add('light-mode');
  }
}
initDarkMode();

async function fetchJson(url) {
  try {
    const connector = url.includes('?') ? '&' : '?';
    const response = await fetch(`${url}${connector}t=${Date.now()}`);
    if (!response.ok) throw new Error('Fetch Error');
    return await response.json();
  } catch (error) {
    console.error(error);
    return null;
  }
}

function updateTabAccent(type) {
  const glow = document.getElementById('bgGlow');
  if (type === 'acg') {
    document.documentElement.style.setProperty('--accent', '#10b981');
    document.documentElement.style.setProperty('--accent-glow', 'rgba(16, 185, 129, 0.35)');
  } else if (type === 'zrsetu') {
    document.documentElement.style.setProperty('--accent', '#ec4899');
    document.documentElement.style.setProperty('--accent-glow', 'rgba(236, 72, 153, 0.35)');
  } else {
    document.documentElement.style.setProperty('--accent', '#6366f1');
    document.documentElement.style.setProperty('--accent-glow', 'rgba(99, 102, 241, 0.35)');
  }
}

function switchTab(type) {
  if (currentTab === type && document.getElementById('contentList').style.display !== 'none') return;
  currentTab = type;
  localStorage.setItem('setutime_active_tab', type);

  document.querySelectorAll('.dock-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${type}`).classList.add('active');

  updateTabAccent(type);

  const mainTitle = document.getElementById('main-title');
  const subTitle = document.getElementById('sub-title');
  if (type === 'setu') {
    mainTitle.innerText = "SetuTime";
    subTitle.innerText = "ACGエッチ画像まとめ";
  } else if (type === 'zrsetu') {
    mainTitle.innerText = "SetuTime";
    subTitle.innerText = "Cosplayエッチ画像まとめ";
  } else {
    mainTitle.innerText = "SetuTime";
    subTitle.innerText = "全年龄向ACGイラストまとめ";
  }

  renderCurrentList(true);
}

async function renderCurrentList(isTabSwitch = false) {
  const listDiv = document.getElementById('contentList');
  const paginationCtrl = document.getElementById('paginationCtrl');
  const skeleton = document.getElementById('skeleton');
  
  if (isTabSwitch) {
    listDiv.style.display = 'none';
    skeleton.style.display = 'flex';
    paginationCtrl.style.display = 'none';
  }

  const activePage = currentPage[currentTab];
  const totalCount = currentTab === 'acg' ? totalAcgCount : (currentTab === 'setu' ? totalSetuCount : totalZrsetuCount);
  const totalPages = Math.ceil(totalCount / ITEMS_PER_PAGE) || 1;

  const startIdx = (activePage - 1) * ITEMS_PER_PAGE;
  const endIdx = activePage * ITEMS_PER_PAGE;
  
  const neededFileIndexStart = Math.floor(startIdx / SERVER_ITEMS_PER_FILE) + 1;
  const neededFileIndexEnd = Math.floor((endIdx - 1) / SERVER_ITEMS_PER_FILE) + 1;

  for (let p = neededFileIndexStart; p <= neededFileIndexEnd; p++) {
    if (!cachePages[p]) {
      const pageData = await fetchJson(`${rootUrl}data_pages/${p}.json`);
      if (pageData) {
        cachePages[p] = pageData;
        if (pageData.acg) pageData.acg.forEach(x => !allAcgItems.some(y => y.file === x.file) && allAcgItems.push(x));
        if (pageData.setu) pageData.setu.forEach(x => !allSetuItems.some(y => y.file === x.file) && allSetuItems.push(x));
        if (pageData.zrsetu) pageData.zrsetu.forEach(x => !allZrsetuItems.some(y => y.file === x.file) && allZrsetuItems.push(x));
      }
    }
  }

  const currentPool = currentTab === 'acg' ? allAcgItems : (currentTab === 'setu' ? allSetuItems : allZrsetuItems);
  currentPool.sort((a, b) => (parseInt(b.file.match(/\d+/)?.[0] || 0)) - (parseInt(a.file.match(/\d+/)?.[0] || 0)));

  const pageItems = currentPool.slice(startIdx, endIdx);

  if (pageItems.length === 0) {
    listDiv.innerHTML = `<div style="text-align:center; padding:40px; color:var(--sub);">暂无相关内容</div>`;
  } else {
    listDiv.innerHTML = pageItems.map(item => `
      <li class="mag-card" onclick="window.open('/${currentTab}/${item.file}', '_self')">
        <div class="mag-info">
          <span class="mag-num">ISSUE #${item.file.match(/\d+/)?.[0] || '?'}</span>
          <div class="mag-title">第 ${item.file.match(/\d+/)?.[0] || '?'} 期</div>
          <div class="mag-desc">${item.caption || '完整画集特辑更新'}</div>
        </div>
        <div class="mag-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </div>
      </li>
    `).join('');
  }

  skeleton.style.display = 'none';
  listDiv.style.display = 'flex';

  setTimeout(() => {
    document.querySelectorAll('.mag-card').forEach((el, i) => {
      setTimeout(() => el.classList.add('enter'), i * 40);
    });
  }, 10);

  document.getElementById('pageCurrentInput').value = activePage;
  document.getElementById('pageTotalLabel').innerText = totalPages;

  document.getElementById('prevPageBtn').classList.toggle('disabled', activePage <= 1);
  document.getElementById('nextPageBtn').classList.toggle('disabled', activePage >= totalPages);

  paginationCtrl.style.display = 'flex';
}

function handleInputJump(val) {
  const totalCount = currentTab === 'acg' ? totalAcgCount : (currentTab === 'setu' ? totalSetuCount : totalZrsetuCount);
  const totalPages = Math.ceil(totalCount / ITEMS_PER_PAGE) || 1;
  let pageNum = parseInt(val);
  if (isNaN(pageNum)) return;
  pageNum = Math.max(1, Math.min(totalPages, pageNum));
  currentPage[currentTab] = pageNum;
  savePage(currentTab, pageNum);
  renderCurrentList();
}

function changePage(dir) {
  const totalCount = currentTab === 'acg' ? totalAcgCount : (currentTab === 'setu' ? totalSetuCount : totalZrsetuCount);
  const totalPages = Math.ceil(totalCount / ITEMS_PER_PAGE) || 1;
  const target = currentPage[currentTab] + dir;
  if (target >= 1 && target <= totalPages) {
    currentPage[currentTab] = target;
    savePage(currentTab, target);
    renderCurrentList();
  }
}

function toggleSearch(show) {
  const modal = document.getElementById('searchModal');
  modal.classList.toggle('active', show);
  if (show) setTimeout(() => document.getElementById('searchInput').focus(), 100);
  else {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').innerHTML = '';
  }
}

function doSearch() {
  const val = document.getElementById('searchInput').value.trim().toLowerCase();
  const resultsDiv = document.getElementById('searchResults');
  if (!val) { resultsDiv.innerHTML = ''; return; }

  const currentPool = currentTab === 'acg' ? allAcgItems : (currentTab === 'setu' ? allSetuItems : allZrsetuItems);
  const matched = currentPool.filter(item => {
    const captionMatch = item.caption && item.caption.toLowerCase().includes(val);
    const numMatch = (item.file.match(/\d+/)?.[0] || '').includes(val);
    return captionMatch || numMatch;
  });

  resultsDiv.innerHTML = matched.map(item => `
    <li class="mag-card enter" onclick="window.open('/${currentTab}/${item.file}', '_self')">
      <div class="mag-info">
        <span class="mag-num">ISSUE #${item.file.match(/\d+/)?.[0] || '?'}</span>
        <div class="mag-title">第 ${item.file.match(/\d+/)?.[0] || '?'} 期</div>
        <div class="mag-desc">${item.caption || '全卡片点击浏览'}</div>
      </div>
      <div class="mag-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></div>
    </li>
  `).join('');
}

window.onkeydown = (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); toggleSearch(true); }
  if (e.key === 'Escape') toggleSearch(false);
};

async function initApp() {
  const pBar = document.getElementById('progressBar');
  pBar.style.width = '30%';

  const savedTab = localStorage.getItem('setutime_active_tab') || 'setu';
  currentTab = savedTab;
  
  document.querySelectorAll('.dock-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${currentTab}`).classList.add('active');
  updateTabAccent(currentTab);

  const globalData = await fetchJson(`${rootUrl}data.json`);
  pBar.style.width = '70%';

  if (globalData) {
    const getCount = arr => (arr && arr.length > 0) ? (parseInt(arr[0].file) || arr.length) : 0;
    totalAcgCount = getCount(globalData.acg);
    totalSetuCount = getCount(globalData.setu);
    totalZrsetuCount = getCount(globalData.zrsetu);

    allAcgItems = globalData.acg || [];
    allSetuItems = globalData.setu || [];
    allZrsetuItems = globalData.zrsetu || [];

    await renderCurrentList();
  }

  pBar.style.width = '100%';
  setTimeout(() => pBar.style.opacity = '0', 250);
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
